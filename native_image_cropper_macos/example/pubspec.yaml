name: native_image_cropper_macos_example
description: Demonstrates how to use the native_image_cropper_macos plugin.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.0.0
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter

  native_image_cropper_macos: ^0.4.0
  cupertino_icons: ^1.0.6
  # Saving cropped image to gallery.
  gal: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  cosee_lints: 0.13.0
  dart_code_linter: ^4.0.0

flutter:
  assets:
    - assets/sail-boat.png
