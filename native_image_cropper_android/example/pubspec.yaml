name: native_image_cropper_android_example
description: Demonstrates how to use the native_image_cropper_android plugin.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.0.0
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter

  native_image_cropper_android: ^0.3.0
  # Saving cropped image to gallery.
  gal: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  cosee_lints: 0.14.0
  dart_code_linter: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sail-boat.png
